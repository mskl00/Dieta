pan>\n      <\u002Fdiv>\n      <h2 class=\"serif text-5xl sm:text-6xl tracking-tight\">La <span class=\"serif-i text-forest-700\">letteratura<\u002Fspan> dietro al protocollo.<\u002Fh2>\n      <p class=\"mt-3 text-ink2 text-lg max-w-3xl\">\n        Tutte le affermazioni della sezione <strong class=\"text-ink\">Scienza<\u002Fstrong> sono ancorate a queste fonti peer-reviewed (review, meta-analisi, studi osservazionali, linee-guida). Clicca i numeri <span class=\"ref-cite\" style=\"cursor:default\">n<\u002Fspan> all'interno dell'app per saltare direttamente allo studio.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"lg:col-span-4\">\n      <div class=\"bg-paper border border-line rounded-2xl p-5\">\n        <div class=\"eyebrow text-ink3 mb-3\">Tipologia fonti<\u002Fdiv>\n        <div class=\"space-y-2 text-[13px]\">\n          <div class=\"flex justify-between\"><span class=\"text-ink\">Meta-analisi<\u002Fspan><span class=\"mono text-ink3\">2<\u002Fspan><\u002Fdiv>\n          <div class=\"flex justify-between\"><span class=\"text-ink\">Review sistematiche<\u002Fspan><span class=\"mono text-ink3\">3<\u002Fspan><\u002Fdiv>\n          <div class=\"flex justify-between\"><span class=\"text-ink\">Studi clinici<\u002Fspan><span class=\"mono text-ink3\">2<\u002Fspan><\u002Fdiv>\n          <div class=\"flex justify-between\"><span class=\"text-ink\">Linee-guida<\u002Fspan><span class=\"mono text-ink3\">1<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Disclaimer about original speculative refs -->\n  <div class=\"bg-clay-50 border border-clay-100 rounded-2xl p-6\">\n    <div class=\"flex items-start gap-4\">\n      <svg class=\"w-6 h-6 text-clay-700 shrink-0 mt-0.5\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg>\n      <div>\n        <div class=\"eyebrow text-clay-700 mb-2\">Nota di trasparenza<\u002Fdiv>\n        <p class=\"text-[14.5px] text-ink leading-relaxed\">\n          La prima versione di questa app citava studi che <strong>non risultavano rintracciabili<\u002Fstrong> nella letteratura (\"Nature Metabolism 2025\", \"Endocrinology 2026\", ecc.). Questa edizione li sostituisce con fonti reali ricavate da una revisione sistematica della letteratura italiana e internazionale (PubMed, NCBI, riviste peer-reviewed).\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Bibliography list -->\n  <div id=\"bib-list\" class=\"grid md:grid-cols-2 gap-5\"><\u002Fdiv>\n\n  <!-- Disclaimer -->\n  <div class=\"bg-paper border border-line rounded-2xl p-6 sm:p-7 text-center\">\n    <p class=\"text-[13px] text-ink2 leading-relaxed max-w-3xl mx-auto\">\n      <strong class=\"text-ink\">Disclaimer clinico.<\u002Fstrong> Questo materiale è informativo, non costituisce parere medico né sostituisce la diagnosi e il trattamento personalizzato. Qualsiasi cambiamento della terapia farmacologica, dieta o protocollo di esercizio va concordato con il proprio endocrinologo, medico di base, nutrizionista clinico e/o preparatore.\n    <\u002Fp>\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ============= MOBILE BOTTOM NAV ============= -->\n<nav class=\"mobile-nav md:hidden fixed bottom-0 left-0 right-0 z-40 px-2 pb-[max(0.5rem,env(safe-area-inset-bottom))] pt-2\">\n  <div class=\"grid mobile-nav-6 gap-0.5\">\n    <button data-tab-btn=\"analysis\" class=\"mobile-tab flex flex-col items-center gap-1 py-2 px-0.5 rounded-xl text-ink3 transition-colors\" data-active=\"true\">\n      <svg class=\"w-5 h-5\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M4 19V5l8 6 8-6v14\"><\u002Fpath><\u002Fsvg>\n      <span class=\"text-[9.5px] font-semibold\">Scienza<\u002Fspan>\n      <span class=\"mobile-tab-dot w-1 h-1 rounded-full bg-clay-500\"><\u002Fspan>\n    <\u002Fbutton>\n    <button data-tab
