  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 hidden; }\n\n  /* Subtle paper texture via radial dots */\n  .canvas-texture {\n    background-image:\n      radial-gradient(circle at 20% 30%, rgba(184,92,60,0.04) 0%, transparent 40%),\n      radial-gradient(circle at 80% 70%, rgba(47,74,44,0.04) 0%, transparent 40%);\n  }\n\n  .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }\n  .serif-i { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; }\n  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }\n\n  /* ---------- Top eyebrow nav ---------- */\n  .eyebrow {\n    font-family: 'Geist Mono', ui-monospace, monospace;\n    font-size: 11px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    font-weight: 500;\n  }\n\n  /* ---------- Tab bar (desktop) ---------- */\n  .tab-pill {\n    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);\n    position: relative;\n  }\n  .tab-pill[data-active=\"true\"] {\n    background: var(--ink);\n    color: var(--canvas);\n  }\n  .tab-pill[data-active=\"true\"] .tab-num { color: var(--sand); }\n  .tab-pill:hover:not([data-active=\"true\"]) {\n    background: rgba(27,30,26,0.06);\n  }\n\n  /* ---------- Mobile bottom nav ---------- */\n  .mobile-nav {\n    background: rgba(255,252,245,0.92);\n    backdrop-filter: blur(20px) saturate(160%);\n    border-top: 1px solid var(--line);\n    box-shadow: 0 -8px 30px rgba(0,0,0,0.06);\n  }\n  .mobile-tab[data-active=\"true\"] {\n    color: var(--forest-deep);\n  }\n  .mobile-tab[data-active=\"true\"] .mobile-tab-dot { opacity: 1; transform: scale(1); }\n  .mobile-tab-dot { opacity: 0; transform: scale(0); transition: all .2s; }\n\n  /* ---------- Meal hero (the \"image\" placeholder) ---------- */\n  .meal-hero {\n    position: relative;\n    aspect-ratio: 16 / 11;\n    border-radius: 18px;\n    overflow: hidden;\n    isolation: isolate;\n  }\n  .meal-hero::before {\n    content: \"\";\n    position: absolute; inset: 0;\n    background-image:\n      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.5) 0%, transparent 35%),\n      radial-gradient(circle at 75% 80%, rgba(0,0,0,0.08) 0%, transparent 45%);\n    z-index: 1;\n  }\n  .meal-hero::after {\n    content: \"\";\n    position: absolute; inset: 0;\n    background-image:\n      radial-gradient(circle 1.5px at 20% 80%, rgba(255,255,255,0.45) 99%, transparent 100%),\n      radial-gradient(circle 1px at 70% 30%, rgba(255,255,255,0.4) 99%, transparent 100%),\n      radial-gradient(circle 1px at 85% 55%, rgba(0,0,0,0.1) 99%, transparent 100%),\n      radial-gradient(circle 1.5px at 15% 40%, rgba(0,0,0,0.08) 99%, transparent 100%);\n    z-index: 2;\n  }\n  .meal-hero .emoji-main {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 4.5rem;\n    z-index: 3;\n    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.18));\n    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);\n  }\n  .meal-hero .emoji-accent {\n    position: absolute;\n    font-size: 1.5rem;\n    z-index: 3;\n    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15));\n    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);\n  }\n  .meal-hero .emoji-accent.a1 { top: 12%; right: 14%; transform: rotate(15deg); }\n  .meal-hero .emoji-accent.a2 { bottom: 14%; left: 12%; transform: rotate(-12deg); }\n  .meal-card:hover .meal-hero .emoji-main { transform: scale(1.08) rotate(-3deg); }\n  .meal-card:hover .meal-hero .emoji-accent.a1 { transform: rotate(25deg) translate(-4px, 4px); }\n  .meal-card:hover .meal-hero .emoji-accent.a2 { transform: rotate(-22deg) translate(4px, -4px); }\n\n  /* ---------- Card hover ---------- */\n  .meal-card {\n    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s, border-color 0.3s;\n    cursor: pointer;\n  }\n  .meal-card:hover {\n    transform: translateY(-4px);\n    box-shadow: 0 24px 50px -20px rgba(27,30,26,0.18);\n    border-color: var(--ink) !important;\n  }\n\n  /* ---------- Filter chips ---------- */\n  .chip {\n    transition: all 0.2s;\n    border: 1px solid var(--line);\n    padding: 8px 16px;\n    border-radius: 999px;\n    background: var(--paper);\n    color: var(--ink2);\n    font-size: 13px;\n    font-weight: 500;\n    cursor: pointer;\n    white-space: nowrap;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .chip:hover { background: rgba(27,30,26,0.05); color: var(--ink); }\n  .chip[data-active=\"true\"] {\n    background: var(--ink);\n    color: var(--canvas);\n    border-color: var(--ink);\n  }\n  .chip-tag[data-active=\"true\"] {\n    background: var(--clay);\n    color: var(--canvas);\n    border-color: var(--clay);\n  }\n  .chip-variant[data-active=\"true\"] {\n    background: var(--forest);\n    color: var(--canvas);\n    border-color: var(--forest);\n  }\n\n  /* ---------- Sci links ---------- */\n  .sci-link {\n    color: var(--clay-deep);\n    font-weight: 600;\n    text-decoration: none;\n    border-bottom: 1.5px dotted var(--clay);\n    padding-bottom: 1px;\n    transition: all 0.2s;\n  }\n  .sci-link:hover {\n    background: var(--clay);\n    color: var(--canvas);\n    border-bottom-color: var(--clay);\n    padding: 1px 4px;\n    border-radius: 3px;\n  }\n\n  /* ---------- Tag pills on cards ---------- */\n  .micro-tag {\n    font-family: 'Geist Mono', ui-monospace, monospace;\n    font-size: 9.5px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    font-weight: 600;\n    padding: 3px 7px;\n    border-radius: 4px;\n    border: 1px solid currentColor;\n    display: inline-flex;\n    align-items: center;\n    gap: 4px;\n    white-space: nowrap;\n  }\n\n  /* ---------- Section divider ---------- */\n  .section-rule {\n    display: flex; align-items: center; gap: 1rem;\n    color: var(--ink3);\n  }\n  .section-rule::before, .section-rule::after {\n    content: \"\"; flex: 1; height: 1px; background: var(--line);\n  }\n\n  /* ---------- Pull quote ---------- */\n  .pull-quote {\n    font-family: 'Instrument Serif', Georgia, serif;\n    font-size: clamp(1.5rem, 2.8vw, 2.25rem);\n    line-height: 1.25;\n    color: var(--forest-deep);\n    letter-spacing: -0.015em;\n  }\n\n  /* ---------- Modal ---------- */\n  .modal-backdrop {\n    background: rgba(22,44,27,0.4);\n    backdrop-filter: blur(8px) saturate(140%);\n  }\n  .modal-panel {\n    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;\n  }\n\n  /* ---------- Planner ---------- */\n  .planner-link {\n    cursor: pointer;\n    padding: 10px 12px;\n    border-radius: 10px;\n    border: 1px solid transparent;\n    transition: all 0.2s;\n    display: block;\n  }\n  .planner-link:hover {\n    background: var(--paper);\n    border-color: var(--line);\n    box-shadow: 0 2px 8px rgba(0,0,0,0.04);\n  }\n  .planner-link .pl-emoji { font-size: 1rem; }\n\n  /* ---------- Animations ---------- */\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(8px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n  .fade-up { animation: fadeUp 0.5s cubic-bezier(0.4,0,0.2,1) both; }\n\n  /* ---------- Exercise card ---------- */\n  .exercise-card {\n    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);\n  }\n  .exercise-card:hover {\n    border-color: var(--forest);\n    transform: translateY(-2px);\n    box-shadow: 0 18px 40px -20px rgba(22,44,27,0.25);\n  }\n  .exercise-svg-wrap {\n    background:\n      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6) 0%, transparent 50%),\n      linear-gradient(135deg, #F5EBD7 0%, #E8DFD0 100%);\n    color: var(--forest-deep);\n    border-radius: 14px;\n    transition: background 0.3s;\n  }\n  .exercise-card:hover .exercise-svg-wrap {\n    background:\n      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7) 0%, transparent 50%),\n      linear-gradient(135deg, #DCE5D2 0%, #B8CCB0 100%);\n  }\n\n  /* ---------- Hide scrollbars utility ---------- */\n  .no-scrollbar::-webkit-scrollbar { display: none; }\n  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }\n\n  /* ---------- Number ticker ---------- */\n  .stat-num {\n    font-family: 'Instrument Serif', Georgia, serif;\n    font-size: clamp(2.5rem, 4.5vw, 4rem);\n    line-height: 1;\n    letter-spacing: -0.02em;\n    color: var(--forest-deep);\n  }\n\n  /* Pillar card */\n  .pillar-card {\n    transition: all .35s ease;\n    position: relative;\n    overflow: hidden;\n  }\n  .pillar-card::before {\n    content: \"\";\n    position: absolute; inset: 0;\n    background: radial-gradient(circle at 90% 110%, var(--accent, transparent) 0%, transparent 50%);\n    opacity: 0.12;\n    pointer-events: none;\n    transition: opacity .35s;\n  }\n  .pillar-card:hover::before { opacity: 0.25; }\n  .pillar-card:hover { transform: translateY(-3px); }\n\n  /* Recipe modal close target */\n  .icon-btn {\n    width: 40px; height: 40px;\n    display: inline-flex; align-items: center; justify-content: center;\n    border-radius: 999px;\n    background: var(--paper);\n    border: 1px solid var(--line);\n    transition: all .2s;\n  }\n  .icon-btn:hover { background: var(--ink); color: var(--paper); }\n\n  /* Sub-bar */\n  .subnav-wrap {\n    background: var(--canvas);\n    background: linear-gradient(180deg, var(--canvas) 0%, var(--canvas) 70%, rgba(250,246,238,0) 100%);\n  }\n\n  /* ---------- Reading progress bar ---------- */\n  .read-progress {\n    position: fixed; left: 0; top: 0;\n    height: 2.5px;\n    background: linear-gradient(90deg, var(--clay) 0%, var(--forest) 100%);\n    z-index: 100;\n    width: 0%;\n    transition: width 0.1s linear;\n  }\n\n  /* ---------- Sticky inline TOC ---------- */\n  .toc-chip {\n    padding: 6px 12px;\n    border-radius: 999px;\n    border: 1px solid var(--line);\n    background: var(--paper);\n    color: var(--ink2);\n    font-size: 12px;\n    font-weight: 500;\n    transition: all 0.2s;\n    white-space: nowrap;\n    cursor: pointer;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .toc-chip:hover { background: var(--ink); color: var(--canvas); border-color: var(--ink); }\n  .toc-chip .toc-num {\n    font-family: 'Geist Mono', ui-monospace, monospace;\n    font-size: 10px;\n    opacity: 0.6;\n  }\n\n  /* ---------- Chapter / article anchor cards ---------- */\n  .chapter {\n    scroll-margin-top: 180px;\n  }\n  .chapter-num {\n    font-family: 'Instrument Serif', Georgia, serif;\n    font-size: clamp(3rem, 6vw, 5rem);\n    line-height: 0.9;\n    color: var(--clay);\n    letter-spacing: -0.02em;\n  }\n  .chapter-title {\n    font-family: 'Instrument Serif', Georgia, serif;\n    font-size: clamp(2rem, 4vw, 3.25rem);\n    line-height: 1.05;\n    letter-spacing: -0.015em;\n  }\n\n  /* ---------- Citation chip [n] inline ---------- */\n  .ref-cite {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    min-width: 22px; height: 22px;\n    padding: 0 6px;\n    border-radius: 6px;\n    background: var(--clay-deep);\n    color: var(--canvas);\n    font-family: 'Geist Mono', ui-monospace, monospace;\n    font-size: 11px;\n    font-weight: 600;\n    margin: 0 2px;\n    vertical-align: 1px;\n    cursor: pointer;\n    transition: all 0.15s;\n    text-decoration: none;\n  }\n  .ref-cite:hover {\n    background: var(--ink);\n    transform: translateY(-1px);\n  }\n\n  /* ---------- Bibliography card ---------- */\n  .bib-card {\n    transition: all 0.3s;\n    scroll-margin-top: 180px;\n  }\n  .bib-card:hover {\n    border-color: var(--clay);\n    transform: translateY(-2px);\n    box-shadow: 0 16px 36px -16px rgba(184,92,60,0.2);\n  }\n  .bib-card[data-flash=\"true\"] {\n    border-color: var(--clay);\n    background: var(--clay-50);\n    box-shadow: 0 0 0 4px var(--clay-50);\n  }\n\n  /* ---------- Variant chip on meal card ---------- */\n  .variant-pill {\n    font-family: 'Geist Mono', ui-monospace, monospace;\n    font-size: 9px;\n    font-weight: 700;\n    letter-spacing: 0.05em;\n    padding: 2px 6px;\n    border-radius: 4px;\n    text-transform: uppercase;\n    border: 1px solid;\n  }\n  .variant-pill.gf  { background: #FEF3E6; color: #8A6A1E; border-color: #F2E5BF; }\n  .variant-pill.lf  { background: #EAF1F4; color: #2A4754; border-color: #CFDDE3; }\n  .variant-pill.veg { background: #EFF3EB; color: #2F4A2C; border-color: #D9E5D2; }\n\n  /* ---------- Phase tab on workout ---------- */\n  .phase-tab {\n    transition: all 0.25s;\n    cursor: pointer;\n    border-radius: 14px;\n    padding: 16px 20px;\n    border: 1px solid var(--line);\n    background: var(--paper);\n    text-align: left;\n  }\n  .phase-tab[data-active=\"true\"] {\n    background: var(--ink);\n    color: var(--canvas);\n    border-color: var(--ink);\n  }\n  .phase-tab[data-active=\"true\"] .phase-weeks { color: var(--sand); }\n  .phase-tab:hover:not([data-active=\"true\"]) {\n    border-color: var(--ink);\n  }\n\n  /* ---------- Workout day tabs ---------- */\n  .day-tab {\n    border-radius: 14px;\n    padding: 14px 16px;\n    text-align: center;\n    transition: all 0.2s;\n    cursor: pointer;\n    border: 1px solid var(--line);\n    background: var(--paper);\n  }\n  .day-tab[data-active=\"true\"] {\n    background: var(--ink);\n    color: var(--canvas);\n    border-color: var(--ink);\n    transform: translateY(-1px);\n  }\n  .day-tab[data-active=\"true\"] .day-code { color: var(--sand); }\n  .day-tab:hover:not([data-active=\"true\"]) {\n    border-color: var(--ink);\n  }\n\n  /* ---------- Mobile bottom nav columns ---------- */\n  .mobile-nav-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }\n  .mobile-nav-6 { grid-template-columns: repeat(6, minmax(0, 1fr)); }\n\n  /* ---------- AI Chef ---------- */\n  .ai-input {\n    border: 1px solid var(--line);\n    background: var(--paper);\n    padding: 14px 18px;\n    border-radius: 16px;\n    font-size: 15px;\n    color: var(--ink);\n    width: 100%;\n    transition: all 0.2s;\n    font-family: inherit;\n    resize: vertical;\n  }\n  .ai-input:focus {\n    outline: none;\n    border-color: var(--ink);\n    box-shadow: 0 0 0 4px rgba(27,30,26,0.08);\n  }\n  .ai-chip {\n    padding: 8px 14px;\n    border-radius: 999px;\n    border: 1px solid var(--line);\n    background: var(--paper);\n    color: var(--ink2);\n    font-size: 12.5px;\n    font-weight: 500;\n    cursor: pointer;\n    white-space: nowrap;\n    transition: all 0.2s;\n    display: inline-flex;\n    align-items: center;\n    gap: 5px;\n  }\n  .ai-chip:hover { background: rgba(27,30,26,0.05); color: var(--ink); }\n  .ai-chip[data-active=\"true\"] {\n    background: var(--ink);\n    color: var(--canvas);\n    border-color: var(--ink);\n  }\n  .ai-mode {\n    flex: 1;\n    padding: 18px 20px;\n    border-radius: 18px;\n    border: 1px solid var(--line);\n    background: var(--paper);\n    cursor: pointer;\n    transition: all 0.25s;\n    text-align: left;\n  }\n  .ai-mode[data-active=\"true\"] {\n    border-color: var(--ink);\n    background: var(--ink);\n    color: var(--canvas);\n  }\n  .ai-mode[data-active=\"true\"] .ai-mode-icon { background: rgba(255,252,245,0.12); }\n  .ai-mode[data-active=\"true\"] .ai-mode-desc { color: rgba(255,252,245,0.7); }\n  .ai-mode-icon {\n    width: 44px; height: 44px;\n    border-radius: 12px;\n    background: var(--canvas);\n    display: flex; align-items: center; justify-content: center;\n    transition: all 0.25s;\n  }\n  .ai-mode:hover:not([data-active=\"true\"]) {\n    border-color: var(--ink);\n    transform: translateY(-1px);\n  }\n\n  /* dot loader */\n  .ai-loader { display: inline-flex; gap: 4px; }\n  .ai-loader span {\n    width: 6px; height: 6px;\n    background: currentColor;\n    border-radius: 50%;\n    animation: ai-bounce 1.4s infinite ease-in-out both;\n  }\n  .ai-loader span:nth-child(1) { animation-delay: -0.32s; }\n  .ai-loader span:nth-child(2) { animation-delay: -0.16s; }\n  @keyframes ai-bounce {\n    0%, 80%, 100% { transform: scale(0); }\n    40% { transform: scale(1); }\n  }\n\n  .gen-btn {\n    background: var(--ink);\n    color: var(--canvas);\n    padding: 16px 32px;\n    border-radius: 999px;\n    font-weight: 600;\n    font-size: 15px;\n    transition: all 0.2s;\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    cursor: pointer;\n    border: none;\n  }\n  .gen-btn:hover:not(:disabled) {\n    background: var(--clay-deep);\n    transform: translateY(-1px);\n    box-shadow: 0 16px 40px -20px rgba(184,92,60,0.5);\n  }\n  .gen-btn:disabled {\n    opacity: 0.6;\n    cursor: not-allowed;\n  }\n\n  /* ---------- Search input ---------- */\n  .search-input {\n    border: 1px solid var(--line);\n    background: var(--paper);\n    padding: 12px 16px 12px 42px;\n    border-radius: 999px;\n    font-size: 14px;\n    color: var(--ink);\n    width: 100%;\n    transition: all 0.2s;\n    font-family: inherit;\n  }\n  .search-input:focus {\n    outline: none;\n    border-color: var(--ink);\n    box-shadow: 0 0 0 4px rgba(27,30,26,0.08);\n  }\n\n  @media (max-width: 768px) {\n    /* Make space for bottom nav */\n    body { padding-bottom: 80px; }\n    .pull-quote { font-size: 1.5rem; }\n    .toc-chip { font-size: 11px; padding: 5px 10px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n\n<body class=\"antialiased\">\n\n<!-- ============= READING PROGRESS BAR ============= -->\n<div id=\"readProgress\" class=\"read-progress\"><\u002Fdiv>\n\n<!-- ============= TOP NAV ============= -->\n<header class=\"border-b border-line bg-paper/80 backdrop-blur-md sticky top-0 z-40\">\n  <div class=\"max-w-7xl mx-auto px-5 sm:px-8 lg:px-12 h-16 sm:h-[72px] flex items-center justify-between\">\n    <div class=\"flex items-center gap-3 sm:gap-4\">\n      <div class=\"w-10 h-10 sm:w-11 sm:h-11 rounded-xl bg-ink text-canvas flex items-center justify-center shadow-md\">\n        <svg viewBox=\"0 0 24 24\" class=\"w-6 h-6\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n          <path d=\"M12 3v18M7 5c2.5 1 4 3 5 7-1 4-2.5 6-5 7M17 5c-2.5 1-4 3-5 7 1 4 2.5 6 5 7\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"leading-none\">\n        <div class=\"flex items-center gap-2\">\n          <h1 class=\"serif text-[22px] sm:text-2xl tracking-tight text-ink\">HashiRecomp<\u002Fh1>\n          <span class=\"mono text-[10px] sm:text-[11px] font-medium bg-forest-900 text-canvas px-2 py-0.5 rounded\">2026<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"eyebrow text-ink3 mt-1.5 hidden sm:block\">Protocollo Skinny-Fat · Aggiornamento Gennaio 2026<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hidden md:flex items-center gap-3 mono text-[11px] tracking-widest uppercase\">\n      <span class=\"relative flex h-2 w-2\">\n        <span class=\"animate-ping absolute inline-flex h-full w-full rounded-full bg-clay-500 opacity-75\"><\u002Fspan>\n        <span class=\"relative inline-flex rounded-full h-2 w-2 bg-clay-500\"><\u002Fspan>\n      <\u002Fspan>\n      <span class=\"text-ink2 font-medium\">Evidence-based · v.2026.1<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"md:hidden\">\n      <span class=\"mono text-[10px] text-ink3 uppercase tracking-widest\">2026.1<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============= DESKTOP TABS (sticky under header) ============= -->\n<div class=\"subnav-wrap sticky top-16 sm:top-[72px] z-30 hidden md:block pt-4 pb-3\">\n  <div class=\"max-w-7xl mx-auto px-8 lg:px-12\">\n    <div class=\"flex items-center gap-1.5 p-1.5 bg-paper border border-line rounded-2xl shadow-sm w-fit\">\n      <button data-tab-btn=\"analysis\" class=\"tab-pill flex items-center gap-2.5 px-4 lg:px-5 py-2.5 rounded-xl text-[13px] font-semibold text-ink2\" data-active=\"true\">\n        <span class=\"tab-num mono text-[10px] font-medium text-ink3\">01<\u002Fspan>\n        <span>Scienza<\u002Fspan>\n      <\u002Fbutton>\n      <button data-tab-btn=\"meals\" class=\"tab-pill flex items-center gap-2.5 px-4 lg:px-5 py-2.5 rounded-xl text-[13px] font-semibold text-ink2\">\n        <span class=\"tab-num mono text-[10px] font-medium text-ink3\">02<\u002Fspan>\n        <span>Ricette<\u002Fspan>\n      <\u002Fbutton>\n      <button data-tab-btn=\"planner\" class=\"tab-pill flex items-center gap-2.5 px-4 lg:px-5 py-2.5 rounded-xl text-[13px] font-semibold text-ink2\">\n        <span class=\"tab-num mono text-[10px] font-medium text-ink3\">03<\u002Fspan>\n        <span>Planner<\u002Fspan>\n      <\u002Fbutton>\n      <button data-tab-btn=\"gym\" class=\"tab-pill flex items-center gap-2.5 px-4 lg:px-5 py-2.5 rounded-xl text-[13px] font-semibold text-ink2\">\n        <span class=\"tab-num mono text-[10px] font-medium text-ink3\">04<\u002Fspan>\n        <span>Allenamento<\u002Fspan>\n      <\u002Fbutton>\n      <button data-tab-btn=\"ai\" class=\"tab-pill flex items-center gap-2.5 px-4 lg:px-5 py-2.5 rounded-xl text-[13px] font-semibold text-ink2 whitespace-nowrap\">\n        <span class=\"tab-num mono text-[10px] font-medium text-ink3\">05<\u002Fspan>\n        <span>AI Chef<\u002Fspan>\n        <span class=\"mono text-[8.5px] bg-clay-500 text-canvas px-1.5 py-0.5 rounded\">NEW<\u002Fspan>\n      <\u002Fbutton>\n      <button data-tab-btn=\"bibliography\" class=\"tab-pill flex items-center gap-2.5 px-4 lg:px-5 py-2.5 rounded-xl text-[13px] font-semibold text-ink2\">\n        <span class=\"tab-num mono text-[10px] font-medium text-ink3\">06<\u002Fspan>\n        <span>Fonti<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============= MAIN ============= -->\n<main class=\"max-w-7xl mx-auto px-5 sm:px-8 lg:px-12 py-8 sm:py-12 canvas-texture\">\n\n<!-- ================================================== -->\n<!-- SECTION 01: SCIENZA                                 -->\n<!-- ================================================== -->\n<section data-section=\"analysis\" class=\"space-y-14 sm:space-y-20\">\n\n  <!-- HERO -->\n  <div class=\"grid grid-cols-12 gap-6 lg:gap-10 items-end\">\n    <div class=\"col-span-12 lg:col-span-8\">\n      <div class=\"flex items-center gap-3 mb-6\">\n        <span class=\"eyebrow text-clay-700\">01 — Fondamenti<\u002Fspan>\n        <span class=\"h-px w-12 bg-line\"><\u002Fspan>\n        <span class=\"eyebrow text-ink3\">Edizione 2026 · Evidence-based<\u002Fspan>\n      <\u002Fdiv>\n      <h2 class=\"serif text-[44px] sm:text-[64px] lg:text-[80px] leading-[0.95] tracking-tight text-ink mb-6\">\n        Hashimoto &amp; <span class=\"serif-i text-clay-700\">Skinny-Fat<\u002Fspan>:<br>\n        un protocollo <span class=\"serif-i text-forest-700\">documentato<\u002Fspan>.\n      <\u002Fh2>\n      <p class=\"text-lg sm:text-xl text-ink2 max-w-3xl leading-relaxed\">\n        Una sintesi critica della letteratura scientifica peer-reviewed su tiroidite autoimmune e ricomposizione corporea. Ogni affermazione qui sotto è collegata a uno studio reale (clicca i numeri <span class=\"ref-cite\" style=\"cursor:default\">n<\u002Fspan> per la fonte completa nella sezione <strong class=\"text-ink\">Fonti<\u002Fstrong>).\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Stat grid -->\n    <div class=\"col-span-12 lg:col-span-4 grid grid-cols-3 lg:grid-cols-1 gap-3 lg:gap-4\">\n      <div class=\"bg-paper border border-line rounded-2xl p-4 lg:p-5\">\n        <div class=\"stat-num\">8<\u002Fdiv>\n        <div class=\"eyebrow text-ink3 mt-1\">Studi citati<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-paper border border-line rounded-2xl p-4 lg:p-5\">\n        <div class=\"stat-num\">30<\u002Fdiv>\n        <div class=\"eyebrow text-ink3 mt-1\">Ricette curate<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bg-paper border border-line rounded-2xl p-4 lg:p-5\">\n        <div class=\"stat-num\">12<span class=\"text-2xl\">w<\u002Fspan><\u002Fdiv>\n        <div class=\"eyebrow text-ink3 mt-1\">Programma palestra<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- INLINE TOC -->\n  <nav aria-label=\"Indice della sezione\" class=\"bg-paper border border-line rounded-2xl p-3 sm:p-4\">\n    <div class=\"flex items-center gap-3 mb-3 px-1\">\n      <span class=\"eyebrow text-ink3\">Indice<\u002Fspan>\n      <span class=\"h-px flex-1 bg-line\"><\u002Fspan>\n      <span class=\"mono text-[10px] text-ink3 uppercase tracking-widest\">8 capitoli<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"flex flex-wrap gap-2\">\n      <button class=\"toc-chip\" data-toc=\"tldr\"><span class=\"toc-num\">00<\u002Fspan>TL;DR<\u002Fbutton>\n      <button class=\"toc-chip\" data-toc=\"skinnyfat\"><span class=\"toc-num\">01<\u002Fspan>Skinny-Fat<\u002Fbutton>\n      <button class=\"toc-chip\" data-toc=\"hashimoto\"><span class=\"toc-num\">02<\u002Fspan>Hashimoto<\u002Fbutton>\n      <button class=\"toc-chip\" data-toc=\"pillars\"><span class=\"toc-num\">03<\u002Fspan>Pilastri operativi<\u002Fbutton>\n      <button class=\"toc-chip\" data-toc=\"nutrition\"><span class=\"toc-num\">04<\u002Fspan>Dieta &amp; macros<\u002Fbutton>\n      <button class=\"toc-chip\" data-toc=\"micros\"><span class=\"toc-num\">05<\u002Fspan>Micronutrienti<\u002Fbutton>\n      <button class=\"toc-chip\" data-toc=\"exercise\"><span class=\"toc-num\">06<\u002Fspan>Esercizio<\u002Fbutton>\n      <button class=\"toc-chip\" data-toc=\"pharma\"><span class=\"toc-num\">07<\u002Fspan>Farmaco<\u002Fbutton>\n      <button class=\"toc-chip\" data-toc=\"timeline\"><span class=\"toc-num\">08<\u002Fspan>Cronologia<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- TL;DR — 3 takeaways (now backed by real refs) -->\n  <div id=\"ch-tldr\" class=\"chapter bg-forest-900 text-canvas rounded-[28px] p-8 sm:p-12 lg:p-14 relative overflow-hidden\">\n    <div class=\"absolute right-0 top-0 w-64 h-64 rounded-full bg-clay-500/15 blur-3xl\"><\u002Fdiv>\n    <div class=\"absolute left-0 bottom-0 w-72 h-72 rounded-full bg-sand-300/10 blur-3xl\"><\u002Fdiv>\n    <div class=\"relative\">\n      <div class=\"eyebrow text-sand-300 mb-6\">TL;DR — Il Protocollo in 3 punti<\u002Fdiv>\n      <div class=\"grid md:grid-cols-3 gap-8 lg:gap-12\">\n        <div>\n          <div class=\"serif text-5xl text-sand-300 mb-3\">01<\u002Fdiv>\n          <h4 class=\"serif text-2xl mb-2\">Dieta mediterranea anti-infiammatoria<\u002Fh4>\n          <p class=\"text-canvas/75 text-[15px] leading-relaxed\">Omega-3, fibre fermentabili, antiossidanti. Limitare cibi ultra-processati e zuccheri raffinati per modulare l'infiammazione di basso grado. <a data-ref=\"4\" class=\"ref-cite\">4<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div class=\"serif text-5xl text-sand-300 mb-3\">02<\u002Fdiv>\n          <h4 class=\"serif text-2xl mb-2\">1.2–1.5 g/kg di proteine al giorno<\u002Fh4>\n          <p class=\"text-canvas/75 text-[15px] leading-relaxed\">Distribuite su 4 pasti (~25-30g) per supportare la sintesi proteica muscolare rallentata in HT e nel fenotipo skinny-fat. <a data-ref=\"2\" class=\"ref-cite\">2<\u002Fa> <a data-ref=\"6\" class=\"ref-cite\">6<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div class=\"serif text-5xl text-sand-300 mb-3\">03<\u002Fdiv>\n          <h4 class=\"serif text-2xl mb-2\">Forza ricreativa, non agonistica<\u002Fh4>\n          <p class=\"text-canvas/75 text-[15px] leading-relaxed\">L'esercizio volontario regolare migliora la funzione tiroidea; il lavoro fisico estremo o le diete drastiche la peggiorano. <a data-ref=\"7\" class=\"ref-cite\">7<\u002Fa><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== CHAPTER 01: SKINNY-FAT ============== -->\n  <div id=\"ch-skinnyfat\" class=\"chapter grid lg:grid-cols-12 gap-8 lg:gap-14 items-start\">\n    <div class=\"lg:col-span-7 space-y-6\">\n      <div class=\"flex items-baseline gap-5\">\n        <span class=\"chapter-num\">01<\u002Fspan>\n        <div>\n          <span class=\"eyebrow text-clay-700\">Capitolo<\u002Fspan>\n          <h3 class=\"chapter-title mt-1\">Skinny-Fat: <span class=\"serif-i text-clay-700\">il fenotipo invisibile<\u002Fspan>.<\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        Lo <strong class=\"text-ink\">skinny-fat<\u002Fstrong> (normal-weight obesity, NWO) descrive individui con peso e BMI normali ma <strong class=\"text-ink\">alta percentuale di grasso e bassa massa magra<\u002Fstrong>. Il BMI da solo non lo intercetta: la bioimpedenza o la DEXA sì. <a data-ref=\"1\" class=\"ref-cite\">1<\u002Fa>\n      <\u002Fp>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        Il profilo metabolico è quello di un obeso: grasso viscerale aumentato, insulino-resistenza, dislipidemia, rischio cardiovascolare e di diabete significativamente più alti rispetto ai normopeso senza eccesso adiposo, fino a mortalità superiore. <a data-ref=\"1\" class=\"ref-cite\">1<\u002Fa>\n      <\u002Fp>\n\n      <!-- Pull quote -->\n      <blockquote class=\"border-l-2 border-clay-500 pl-6 py-2 my-6\">\n        <p class=\"pull-quote\">Una dieta isocalorica ad alto contenuto proteico migliora la composizione corporea anche <span class=\"serif-i\">senza variazione di peso<\u002Fspan>.<\u002Fp>\n      <\u002Fblockquote>\n\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        Lo studio di Arciero et al. (2022) ha dimostrato che la combinazione di <strong class=\"text-ink\">protein-pacing<\u002Fstrong> (proteine distribuite nei pasti) e <strong class=\"text-ink\">esercizio multi-componente<\u002Fstrong> (forza + cardio) migliora la composizione corporea in adulti con NWO/sovrappeso, riducendo grasso viscerale anche a parità di calorie. <a data-ref=\"6\" class=\"ref-cite\">6<\u002Fa>\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"lg:col-span-5 space-y-4 lg:sticky lg:top-44\">\n      <div class=\"bg-clay-50 border border-clay-100 rounded-2xl p-6\">\n        <div class=\"eyebrow text-clay-700 mb-3\">Profilo metabolico tipico<\u002Fdiv>\n        <ul class=\"space-y-3 text-[14px] text-ink leading-relaxed\">\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold mt-1\">→<\u002Fspan><span><strong>BMI 18–25<\u002Fstrong> ma grasso corporeo &gt; 28% (donna) / &gt; 22% (uomo)<\u002Fspan><\u002Fli>\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold mt-1\">→<\u002Fspan><span>Grasso <strong>viscerale<\u002Fstrong> e periviscerale alto<\u002Fspan><\u002Fli>\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold mt-1\">→<\u002Fspan><span>Insulino-resistenza subclinica (HOMA-IR &gt; 2)<\u002Fspan><\u002Fli>\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold mt-1\">→<\u002Fspan><span>Sarcopenia <em>relativa<\u002Fem>: poca massa magra<\u002Fspan><\u002Fli>\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold mt-1\">→<\u002Fspan><span>Astenia, difficoltà a perdere grasso e a guadagnare muscolo<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"bg-paper border border-line rounded-2xl p-5\">\n        <div class=\"eyebrow text-ink3 mb-2\">Strategia chiave<\u002Fdiv>\n        <p class=\"text-[14px] text-ink leading-relaxed\">\n          Non si tratta di <em>perdere peso<\u002Fem>, ma di <strong class=\"text-ink\">ricomporre<\u002Fstrong>: meno grasso, più muscolo. Dieta proteica + resistance training + cardio moderato. <a data-ref=\"6\" class=\"ref-cite\">6<\u002Fa>\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== CHAPTER 02: HASHIMOTO ============== -->\n  <div id=\"ch-hashimoto\" class=\"chapter grid lg:grid-cols-12 gap-8 lg:gap-14 items-start\">\n    <div class=\"lg:col-span-5 order-2 lg:order-1 space-y-4 lg:sticky lg:top-44\">\n      <div class=\"bg-forest-50 border border-forest-100 rounded-2xl p-6\">\n        <div class=\"eyebrow text-forest-700 mb-3\">Numeri chiave<\u002Fdiv>\n        <div class=\"grid grid-cols-2 gap-4\">\n          <div>\n            <div class=\"serif text-4xl text-forest-700 leading-none\">~5%<\u002Fdiv>\n            <div class=\"text-[12px] text-ink2 mt-1 leading-snug\">dei pazienti HT subclinici evolve a ipotiroidismo <strong>conclamato ogni anno<\u002Fstrong><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"serif text-4xl text-forest-700 leading-none\">60%<\u002Fdiv>\n            <div class=\"text-[12px] text-ink2 mt-1 leading-snug\">della conversione <strong>T4→T3<\u002Fstrong> avviene nel fegato<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"serif text-4xl text-forest-700 leading-none\">F &gt; M<\u002Fdiv>\n            <div class=\"text-[12px] text-ink2 mt-1 leading-snug\">rapporto di prevalenza nettamente <strong>femminile<\u002Fstrong> (~7:1)<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"serif text-4xl text-forest-700 leading-none\">TSH<br>0.5–2.5<\u002Fdiv>\n            <div class=\"text-[12px] text-ink2 mt-1 leading-snug\">range target post-terapia (AACE/ATA) <a data-ref=\"8\" class=\"ref-cite\">8<\u002Fa><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lg:col-span-7 order-1 lg:order-2 space-y-6\">\n      <div class=\"flex items-baseline gap-5\">\n        <span class=\"chapter-num\">02<\u002Fspan>\n        <div>\n          <span class=\"eyebrow text-clay-700\">Capitolo<\u002Fspan>\n          <h3 class=\"chapter-title mt-1\">Hashimoto: <span class=\"serif-i text-forest-700\">l'attacco lento<\u002Fspan>.<\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        La <strong class=\"text-ink\">tiroidite di Hashimoto<\u002Fstrong> (HT) è una malattia autoimmune cronica della tiroide. Il sistema immunitario produce autoanticorpi anti-tireoglobulina (TgAb) e anti-tireoperossidasi (TPOAb) che distruggono progressivamente il tessuto ghiandolare. <a data-ref=\"4\" class=\"ref-cite\">4<\u002Fa>\n      <\u002Fp>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        L'eziologia è <strong class=\"text-ink\">multifattoriale<\u002Fstrong>: predisposizione genetica, fattori ambientali (infezioni, stress cronico, eccesso di iodio), e in tempi recenti il <strong class=\"text-ink\">microbiota intestinale<\u002Fstrong>. La disbiosi e l'aumento della permeabilità intestinale (\"leaky gut\") sono associati ad autoimmunità tiroidea: il microbiota regola assorbimento di iodio/selenio/ferro e il bilanciamento Th17/Treg. <a data-ref=\"5\" class=\"ref-cite\">5<\u002Fa>\n      <\u002Fp>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        L'impatto metabolico è rilevante anche in fase subclinica: <strong class=\"text-ink\">rallentamento del metabolismo basale<\u002Fstrong>, difficoltà a perdere grasso o costruire muscolo, affaticabilità, talvolta freddolosità e ritenzione idrica. Molti pazienti, anche ben sostituiti con levotiroxina, mantengono difficoltà di ricomposizione corporea. <a data-ref=\"8\" class=\"ref-cite\">8<\u002Fa>\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== CHAPTER 03: PILLARS (refined) ============== -->\n  <div id=\"ch-pillars\" class=\"chapter\">\n    <div class=\"flex items-baseline gap-5 mb-8\">\n      <span class=\"chapter-num\">03<\u002Fspan>\n      <div>\n        <span class=\"eyebrow text-clay-700\">Capitolo<\u002Fspan>\n        <h3 class=\"chapter-title mt-1\">I tre <span class=\"serif-i text-clay-700\">pilastri<\u002Fspan> operativi.<\u002Fh3>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid md:grid-cols-3 gap-5 lg:gap-6\">\n\n      <article class=\"pillar-card bg-paper border border-line rounded-3xl p-7 lg:p-8\" style=\"--accent:#5E7B53\">\n        <div class=\"flex items-start justify-between mb-7\">\n          <span class=\"serif text-6xl text-forest-700 leading-none\">01<\u002Fspan>\n          <div class=\"w-11 h-11 rounded-xl bg-forest-50 border border-forest-100 flex items-center justify-center\">\n            <svg class=\"w-5 h-5 text-forest-700\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\">\n              <circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h4 class=\"serif text-3xl mb-3 leading-tight\">Protein pacing<\u002Fh4>\n        <p class=\"text-[14.5px] text-ink2 leading-relaxed mb-4\">\n          1.2–1.5 g/kg/die di proteine ad alto VB, distribuiti su 4 pasti da ~25-30g. Soglia leucina (~2.5g/pasto) ottimale per attivare la sintesi proteica muscolare. <a data-ref=\"2\" class=\"ref-cite\">2<\u002Fa>\n        <\u002Fp>\n        <div class=\"pt-4 border-t border-line text-[12px] mono text-ink3 uppercase tracking-widest\">\n          Pasiakos 2015 · Arciero 2022\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"pillar-card bg-paper border border-line rounded-3xl p-7 lg:p-8\" style=\"--accent:#B85C3C\">\n        <div class=\"flex items-start justify-between mb-7\">\n          <span class=\"serif text-6xl text-clay-700 leading-none\">02<\u002Fspan>\n          <div class=\"w-11 h-11 rounded-xl bg-clay-50 border border-clay-100 flex items-center justify-center\">\n            <svg class=\"w-5 h-5 text-clay-700\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\">\n              <circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"7\" r=\"2\"><\u002Fcircle><circle cx=\"18\" cy=\"7\" r=\"2\"><\u002Fcircle><circle cx=\"6\" cy=\"17\" r=\"2\"><\u002Fcircle><circle cx=\"18\" cy=\"17\" r=\"2\"><\u002Fcircle>\n              <path d=\"M9 12l-2-3M15 12l2-3M9 12l-2 3M15 12l2 3\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h4 class=\"serif text-3xl mb-3 leading-tight\">Asse tiroide-intestino<\u002Fh4>\n        <p class=\"text-[14.5px] text-ink2 leading-relaxed mb-4\">\n          Il microbiota modula l'assorbimento di iodio, selenio, ferro e l'equilibrio Th17/Treg. Dieta mediterranea, fibre fermentabili e fermentati (kefir, yogurt) supportano la barriera intestinale. <a data-ref=\"5\" class=\"ref-cite\">5<\u002Fa>\n        <\u002Fp>\n        <div class=\"pt-4 border-t border-line text-[12px] mono text-ink3 uppercase tracking-widest\">\n          Knezevic 2020\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"pillar-card bg-paper border border-line rounded-3xl p-7 lg:p-8\" style=\"--accent:#446A7A\">\n        <div class=\"flex items-start justify-between mb-7\">\n          <span class=\"serif text-6xl text-ocean-500 leading-none\">03<\u002Fspan>\n          <div class=\"w-11 h-11 rounded-xl bg-ocean-50 border border-ocean-100 flex items-center justify-center\">\n            <svg class=\"w-5 h-5 text-ocean-700\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\">\n              <path d=\"M6 8v8M2 10v4M22 10v4M18 8v8M6 12h12\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h4 class=\"serif text-3xl mb-3 leading-tight\">Forza ricreativa<\u002Fh4>\n        <p class=\"text-[14.5px] text-ink2 leading-relaxed mb-4\">\n          Esercizio volontario regolare (resistance training + cardio moderato) → miglior funzione tiroidea (↓TSH, ↓TgAb, ↑VitD). Sforzi occupazionali estremi → effetto opposto. <a data-ref=\"7\" class=\"ref-cite\">7<\u002Fa>\n        <\u002Fp>\n        <div class=\"pt-4 border-t border-line text-[12px] mono text-ink3 uppercase tracking-widest\">\n          Vuletić 2024\n        <\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== CHAPTER 04: NUTRITION + CHART ============== -->\n  <div id=\"ch-nutrition\" class=\"chapter grid lg:grid-cols-12 gap-8 lg:gap-14 items-start\">\n    <div class=\"lg:col-span-7 space-y-6\">\n      <div class=\"flex items-baseline gap-5\">\n        <span class=\"chapter-num\">04<\u002Fspan>\n        <div>\n          <span class=\"eyebrow text-clay-700\">Capitolo<\u002Fspan>\n          <h3 class=\"chapter-title mt-1\">Dieta &amp; <span class=\"serif-i text-forest-700\">macros<\u002Fspan>.<\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        Non esistono diete specifiche ufficialmente approvate per Hashimoto, ma una <strong class=\"text-ink\">dieta mediterranea / anti-infiammatoria<\u002Fstrong> è oggi raccomandata in revisione clinica: cibi integrali, abbondanti omega-3, fibre, antiossidanti, riduzione di UPF e zuccheri raffinati. <a data-ref=\"4\" class=\"ref-cite\">4<\u002Fa>\n      <\u002Fp>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        Le diete eliminative (AIP, low-carb estrema) hanno evidenze cliniche <strong class=\"text-ink\">limitate<\u002Fstrong> e vanno usate solo a breve termine, sotto supervisione. Per il fenotipo skinny-fat è invece confermato il vantaggio di un apporto <strong class=\"text-ink\">iperproteico<\u002Fstrong> (≥1.2 g/kg) ed esercizio combinato. <a data-ref=\"6\" class=\"ref-cite\">6<\u002Fa>\n      <\u002Fp>\n\n      <div class=\"bg-paper border border-line rounded-2xl p-5\">\n        <div class=\"eyebrow text-ink3 mb-3\">Linee operative<\u002Fdiv>\n        <ul class=\"space-y-2.5 text-[14.5px] text-ink leading-relaxed\">\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold\">→<\u002Fspan><span><strong>Colazione completa<\u002Fstrong>: proteine + carboidrati integrali + grassi sani (pasto cruciale per il metabolismo basale)<\u002Fspan><\u002Fli>\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold\">→<\u002Fspan><span><strong>Pesce 2–3×/sett.<\u002Fstrong> per omega-3 a catena lunga (EPA/DHA)<\u002Fspan><\u002Fli>\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold\">→<\u002Fspan><span><strong>Legumi e cereali integrali<\u002Fstrong> a basso indice glicemico per i MAC (carboidrati accessibili al microbiota)<\u002Fspan><\u002Fli>\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold\">→<\u002Fspan><span><strong>Riduzione UPF<\u002Fstrong>, zuccheri aggiunti, additivi industriali<\u002Fspan><\u002Fli>\n          <li class=\"flex gap-3\"><span class=\"text-clay-700 font-bold\">→<\u002Fspan><span>Personalizzare il bilancio calorico: lieve deficit (300-500 kcal) nelle prime 4-6 settimane, poi mantenimento<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Macro chart -->\n    <div class=\"lg:col-span-5 bg-paper border border-line rounded-[28px] p-7 lg:p-9 lg:sticky lg:top-44\">\n      <div class=\"flex items-center justify-between mb-2\">\n        <span class=\"eyebrow text-ink3\">Fig. 01<\u002Fspan>\n        <span class=\"mono text-[10px] text-clay-700 uppercase tracking-widest\">Range tipo<\u002Fspan>\n      <\u002Fdiv>\n      <h4 class=\"serif text-2xl mb-1\">Macro-ripartizione<\u002Fh4>\n      <p class=\"text-sm text-ink2 mb-6\">Range giornaliero indicativo per ricomposizione attiva.<\u002Fp>\n      <div class=\"relative h-64 sm:h-72\">\n        <canvas id=\"macroChart\"><\u002Fcanvas>\n      <\u002Fdiv>\n      <div class=\"mt-6 pt-6 border-t border-line text-[13px] text-ink2 leading-relaxed\">\n        Quota proteica (~30-35%) <strong class=\"text-ink\">protettiva<\u002Fstrong> contro la sarcopenia. Carboidrati a basso IG. Grassi prevalentemente mono- e polinsaturi (omega-3). <a data-ref=\"4\" class=\"ref-cite\">4<\u002Fa> <a data-ref=\"6\" class=\"ref-cite\">6<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== CHAPTER 05: MICRONUTRIENTS ============== -->\n  <div id=\"ch-micros\" class=\"chapter\">\n    <div class=\"flex items-baseline gap-5 mb-8\">\n      <span class=\"chapter-num\">05<\u002Fspan>\n      <div>\n        <span class=\"eyebrow text-clay-700\">Capitolo<\u002Fspan>\n        <h3 class=\"chapter-title mt-1\">I quattro <span class=\"serif-i text-clay-700\">micronutrienti<\u002Fspan> della tiroide.<\u002Fh3>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid sm:grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-5\">\n      <!-- Selenio -->\n      <article class=\"bg-paper border border-line rounded-3xl p-6 hover:border-clay-300 transition-colors\">\n        <div class=\"flex items-center justify-between mb-4\">\n          <span class=\"mono text-xs text-ink3 uppercase tracking-widest\">Se<\u002Fspan>\n          <span class=\"text-2xl\">🥜<\u002Fspan>\n        <\u002Fdiv>\n        <h4 class=\"serif text-2xl mb-2\">Selenio<\u002Fh4>\n        <p class=\"eyebrow text-clay-700 mb-3\">100–200 µg/die<\u002Fp>\n        <p class=\"text-[13.5px] text-ink2 leading-relaxed mb-4\">Cofattore delle deiodinasi (T4→T3) e dei selenoenzimi antiossidanti. La meta-analisi Wichman 2016 mostra riduzione significativa degli anti-TPO con selenometionina. <a data-ref=\"3\" class=\"ref-cite\">3<\u002Fa><\u002Fp>\n        <div class=\"pt-3 border-t border-line text-[11.5px] text-ink2\">\n          <strong>Fonti:<\u002Fstrong> noci del Brasile (2-3 al giorno bastano), tonno, sgombro, uova\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Iodio -->\n      <article class=\"bg-paper border border-line rounded-3xl p-6 hover:border-clay-300 transition-colors\">\n        <div class=\"flex items-center justify-between mb-4\">\n          <span class=\"mono text-xs text-ink3 uppercase tracking-widest\">I<\u002Fspan>\n          <span class=\"text-2xl\">🌊<\u002Fspan>\n        <\u002Fdiv>\n        <h4 class=\"serif text-2xl mb-2\">Iodio<\u002Fh4>\n        <p class=\"eyebrow text-clay-700 mb-3\">150–200 µg/die<\u002Fp>\n        <p class=\"text-[13.5px] text-ink2 leading-relaxed mb-4\">Componente delle T3/T4. <strong class=\"text-ink\">Attenzione<\u002Fstrong>: in HT con anticorpi alti, un eccesso può peggiorare l'autoimmunità. Non integrare senza indicazione medica. <a data-ref=\"4\" class=\"ref-cite\">4<\u002Fa><\u002Fp>\n        <div class=\"pt-3 border-t border-line text-[11.5px] text-ink2\">\n          <strong>Fonti:<\u002Fstrong> sale iodato, pesce, crostacei, alghe in piccole quantità\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Ferro -->\n      <article class=\"bg-paper border border-line rounded-3xl p-6 hover:border-clay-300 transition-colors\">\n        <div class=\"flex items-center justify-between mb-4\">\n          <span class=\"mono text-xs text-ink3 uppercase tracking-widest\">Fe<\u002Fspan>\n          <span class=\"text-2xl\">🥩<\u002Fspan>\n        <\u002Fdiv>\n        <h4 class=\"serif text-2xl mb-2\">Ferro<\u002Fh4>\n        <p class=\"eyebrow text-clay-700 mb-3\">Bilanciare carenze<\u002Fp>\n        <p class=\"text-[13.5px] text-ink2 leading-relaxed mb-4\">Cofattore della perossidasi tiroidea (TPO). Carenze frequenti in HT (specie nelle donne) riducono la sintesi ormonale e amplificano astenia. <a data-ref=\"3\" class=\"ref-cite\">3<\u002Fa><\u002Fp>\n        <div class=\"pt-3 border-t border-line text-[11.5px] text-ink2\">\n          <strong>Fonti:<\u002Fstrong> carne rossa (eme), legumi, semi di zucca + Vit. C\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Vit. D -->\n      <article class=\"bg-paper border border-line rounded-3xl p-6 hover:border-clay-300 transition-colors\">\n        <div class=\"flex items-center justify-between mb-4\">\n          <span class=\"mono text-xs text-ink3 uppercase tracking-widest\">D₃<\u002Fspan>\n          <span class=\"text-2xl\">☀️<\u002Fspan>\n        <\u002Fdiv>\n        <h4 class=\"serif text-2xl mb-2\">Vitamina D<\u002Fh4>\n        <p class=\"eyebrow text-clay-700 mb-3\">Target &gt; 30 ng/mL<\u002Fp>\n        <p class=\"text-[13.5px] text-ink2 leading-relaxed mb-4\">Modulatore immunitario. Carenza comune in autoimmuni; integrare se &lt;20 ng/mL può supportare immunoregolazione e umore. <a data-ref=\"4\" class=\"ref-cite\">4<\u002Fa><\u002Fp>\n        <div class=\"pt-3 border-t border-line text-[11.5px] text-ink2\">\n          <strong>Fonti:<\u002Fstrong> sole, pesce grasso, integrazione invernale dopo dosaggio\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== CHAPTER 06: EXERCISE (mini overview) ============== -->\n  <div id=\"ch-exercise\" class=\"chapter bg-paper border border-line rounded-3xl p-7 sm:p-10 lg:p-12\">\n    <div class=\"grid lg:grid-cols-12 gap-8 items-start\">\n      <div class=\"lg:col-span-7\">\n        <div class=\"flex items-baseline gap-5 mb-6\">\n          <span class=\"chapter-num\">06<\u002Fspan>\n          <div>\n            <span class=\"eyebrow text-clay-700\">Capitolo<\u002Fspan>\n            <h3 class=\"chapter-title mt-1\">Esercizio: <span class=\"serif-i text-forest-700\">non negoziabile<\u002Fspan>.<\u002Fh3>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"text-lg text-ink2 leading-relaxed mb-5\">\n          Lo studio croato di Vuletić et al. (2024) su 438 pazienti HT ha rilevato che <strong class=\"text-ink\">l'attività ricreativa regolare<\u002Fstrong> correla con miglior funzione tiroidea (↓TSH, ↓TgAb, ↑VitD), mentre <strong class=\"text-ink\">l'attività occupazionale intensa<\u002Fstrong> ha effetto opposto. <a data-ref=\"7\" class=\"ref-cite\">7<\u002Fa>\n        <\u002Fp>\n        <p class=\"text-lg text-ink2 leading-relaxed\">\n          Per lo skinny-fat il pattern ottimale combina <strong class=\"text-ink\">forza<\u002Fstrong> (2-4 sedute/sett.) e cardio moderato. L'HIIT in fase acuta (anticorpi alti) può aumentare cortisolo e va dosato con cautela.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"lg:col-span-5\">\n        <div class=\"bg-forest-50 border border-forest-100 rounded-2xl p-6\">\n          <div class=\"eyebrow text-forest-700 mb-3\">Settimana modello<\u002Fdiv>\n          <ul class=\"space-y-3 text-[14px] text-ink leading-relaxed\">\n            <li class=\"flex justify-between gap-3 pb-2 border-b border-forest-100\"><span><strong>4×<\u002Fstrong> Resistance training<\u002Fspan><span class=\"text-ink3 mono text-[11px]\">≤55'<\u002Fspan><\u002Fli>\n            <li class=\"flex justify-between gap-3 pb-2 border-b border-forest-100\"><span><strong>2×<\u002Fstrong> Camminata 30'<\u002Fspan><span class=\"text-ink3 mono text-[11px]\">low-int.<\u002Fspan><\u002Fli>\n            <li class=\"flex justify-between gap-3 pb-2 border-b border-forest-100\"><span><strong>1×<\u002Fstrong> Mobilità / yoga<\u002Fspan><span class=\"text-ink3 mono text-[11px]\">recovery<\u002Fspan><\u002Fli>\n            <li class=\"flex justify-between gap-3\"><span>≥150' attività moderata<\u002Fspan><span class=\"text-ink3 mono text-[11px]\">WHO 2020<\u002Fspan><\u002Fli>\n          <\u002Ful>\n          <a href=\"#\" data-tab-jump=\"gym\" class=\"mt-5 inline-flex items-center gap-2 text-[13px] font-semibold text-clay-700 hover:text-clay-900 transition-colors\">\n            Vai al programma 12 settimane\n            <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== CHAPTER 07: PHARMA ============== -->\n  <div id=\"ch-pharma\" class=\"chapter grid lg:grid-cols-12 gap-8 lg:gap-14 items-start\">\n    <div class=\"lg:col-span-7 space-y-5\">\n      <div class=\"flex items-baseline gap-5\">\n        <span class=\"chapter-num\">07<\u002Fspan>\n        <div>\n          <span class=\"eyebrow text-clay-700\">Capitolo<\u002Fspan>\n          <h3 class=\"chapter-title mt-1\">Farmaco: <span class=\"serif-i text-clay-700\">la levotiroxina<\u002Fspan>.<\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        Il trattamento standard dell'ipotiroidismo conclamato è la <strong class=\"text-ink\">levotiroxina<\u002Fstrong>, da titrare per portare il TSH nel range 0.5–2.5 mIU/L (linee-guida AACE/ATA). <a data-ref=\"8\" class=\"ref-cite\">8<\u002Fa>\n      <\u002Fp>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        Nell'HT <strong class=\"text-ink\">subclinica<\u002Fstrong> (TSH 4–10 mIU/L con fT4 normale) la terapia va valutata caso per caso in base a: età, sintomi, titolo anticorpale, gravidanza, fertilità. Il monitoraggio TSH/fT4 va ripetuto regolarmente.\n      <\u002Fp>\n      <p class=\"text-lg text-ink2 leading-relaxed\">\n        Studi osservazionali mostrano che <strong class=\"text-ink\">selenio<\u002Fstrong> e ottimizzazione dietetica possono ridurre la dose necessaria di levotiroxina in alcuni casi, ma i dati sono ancora preliminari. <a data-ref=\"3\" class=\"ref-cite\">3<\u002Fa>\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"lg:col-span-5\">\n      <div class=\"bg-clay-50 border border-clay-100 rounded-2xl p-6\">\n        <div class=\"flex items-center gap-2 mb-3\">\n          <svg class=\"w-5 h-5 text-clay-700\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg>\n          <div class=\"eyebrow text-clay-700\">Disclaimer<\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"text-[14px] text-ink leading-relaxed\">\n          Questo materiale è <strong>informativo<\u002Fstrong>, non sostituisce la valutazione clinica. Qualsiasi modifica della terapia, integrazione o dieta restrittiva va concordata con il proprio endocrinologo, nutrizionista e medico di base.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== CHAPTER 08: TIMELINE ============== -->\n  <div id=\"ch-timeline\" class=\"chapter bg-paper border border-line rounded-3xl p-7 sm:p-10 lg:p-12\">\n    <div class=\"flex flex-wrap items-end justify-between gap-4 mb-8\">\n      <div class=\"flex items-baseline gap-5\">\n        <span class=\"chapter-num\">08<\u002Fspan>\n        <div>\n          <span class=\"eyebrow text-clay-700\">Capitolo<\u002Fspan>\n          <h3 class=\"chapter-title mt-1\">Cronologia delle <span class=\"serif-i text-forest-700\">evidenze<\u002Fspan>.<\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"mono text-[11px] text-ink3 uppercase tracking-widest\">4 milestone<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"grid sm:grid-cols-2 lg:grid-cols-4 gap-px bg-line rounded-2xl overflow-hidden border border-line\">\n      <div class=\"bg-paper p-6\">\n        <div class=\"mono text-xs text-ink3 mb-3\">2012<\u002Fdiv>\n        <h5 class=\"font-semibold text-[15px] mb-2\">Linee-guida AACE/ATA<\u002Fh5>\n        <p class=\"text-[13px] text-ink2 leading-relaxed\">Standardizzazione del trattamento con levotiroxina e dei target TSH. <a data-ref=\"8\" class=\"ref-cite\">8<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bg-paper p-6\">\n        <div class=\"mono text-xs text-clay-700 mb-3\">2016<\u002Fdiv>\n        <h5 class=\"font-semibold text-[15px] mb-2\">Selenio &amp; anti-TPO<\u002Fh5>\n        <p class=\"text-[13px] text-ink2 leading-relaxed\">Meta-analisi conferma riduzione anticorpi con selenometionina 200µg/die. <a data-ref=\"3\" class=\"ref-cite\">3<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bg-paper p-6\">\n        <div class=\"mono text-xs text-clay-700 mb-3\">2020<\u002Fdiv>\n        <h5 class=\"font-semibold text-[15px] mb-2\">Asse tiroide-intestino<\u002Fh5>\n        <p class=\"text-[13px] text-ink2 leading-relaxed\">Nutrients pubblica review chiave su microbiota e autoimmunità tiroidea. <a data-ref=\"5\" class=\"ref-cite\">5<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bg-paper p-6 bg-forest-900 text-canvas\">\n        <div class=\"mono text-xs text-sand-300 mb-3\">2022–24 ★<\u002Fdiv>\n        <h5 class=\"font-semibold text-[15px] mb-2\">Protein pacing &amp; esercizio<\u002Fh5>\n        <p class=\"text-[13px] text-canvas/75 leading-relaxed\">Arciero conferma efficacia su NWO. Vuletić documenta l'effetto di attività ricreativa in HT. <a data-ref=\"6\" class=\"ref-cite\">6<\u002Fa> <a data-ref=\"7\" class=\"ref-cite\">7<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n<!-- ================================================== -->\n<!-- SECTION 02: MEALS                                   -->\n<!-- ================================================== -->\n<section data-section=\"meals\" class=\"hidden space-y-10\">\n\n  <!-- Section header -->\n  <div class=\"flex flex-col lg:flex-row lg:items-end justify-between gap-6\">\n    <div>\n      <div class=\"flex items-center gap-3 mb-4\">\n        <span class=\"eyebrow text-clay-700\">02 — Database<\u002Fspan>\n        <span class=\"h-px w-12 bg-line\"><\u002Fspan>\n        <span class=\"eyebrow text-ink3\">30 ricette<\u002Fspan>\n      <\u002Fdiv>\n      <h2 class=\"serif text-5xl sm:text-6xl tracking-tight\">Cosa <span class=\"serif-i text-forest-700\">mangiare<\u002Fspan>, e perché.<\u002Fh2>\n      <p class=\"mt-3 text-ink2 text-lg max-w-2xl\">Ogni piatto è una decisione clinica. Clicca per leggere ingredienti, procedimento, micronutrienti e razionale scientifico.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mono text-[11px] text-ink3 uppercase tracking-widest\">\n      <span id=\"meal-count-display\">30<\u002Fspan> risultati\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Search bar -->\n  <div class=\"relative\">\n    <svg class=\"w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-ink3\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\n      <circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m20 20-3.5-3.5\"><\u002Fpath>\n    <\u002Fsvg>\n    <input id=\"meal-search\" type=\"search\" placeholder=\"Cerca una ricetta, ingrediente, micronutriente…\" class=\"search-input\">\n  <\u002Fdiv>\n\n  <!-- Filters -->\n  <div class=\"bg-paper border border-line rounded-3xl p-5 sm:p-6 space-y-5\">\n    <div>\n      <div class=\"eyebrow text-ink3 mb-3\">Tipologia di pasto<\u002Fdiv>\n      <div class=\"flex flex-wrap gap-2\">\n        <button class=\"chip\" data-filter-type=\"all\" data-active=\"true\">Tutti<\u002Fbutton>\n        <button class=\"chip\" data-filter-type=\"Colazione\">🌅 Colazioni<\u002Fbutton>\n        <button class=\"chip\" data-filter-type=\"Pranzo\">☀️ Pranzi<\u002Fbutton>\n        <button class=\"chip\" data-filter-type=\"Spuntino\">🍃 Spuntini<\u002Fbutton>\n        <button class=\"chip\" data-filter-type=\"Cena\">🌙 Cene<\u002Fbutton>\n        <button class=\"chip\" data-filter-type=\"Pre/Post-Workout\">💪 Pre/Post-Workout<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pt-5 border-t border-line\">\n      <div class=\"eyebrow text-ink3 mb-3\">Caratteristica<\u002Fdiv>\n      <div class=\"flex flex-wrap gap-2\">\n        <button class=\"chip chip-tag\" data-filter-tag=\"office\">🏢 Ufficio / Meal-prep<\u002Fbutton>\n        <button class=\"chip chip-tag\" data-filter-tag=\"fast\">⏱ Rapidi (&lt; 10 min)<\u002Fbutton>\n        <button class=\"chip chip-tag\" data-filter-tag=\"anti-inflammatory\">🛡 Anti-infiammatori<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pt-5 border-t border-line\">\n      <div class=\"eyebrow text-ink3 mb-3\">Dieta / Intolleranze<\u002Fdiv>\n      <div class=\"flex flex-wrap gap-2\">\n        <button class=\"chip chip-variant\" data-filter-variant=\"gf\">🌾 Senza glutine<\u002Fbutton>\n        <button class=\"chip chip-variant\" data-filter-variant=\"lf\">🥛 Senza lattosio<\u002Fbutton>\n        <button class=\"chip chip-variant\" data-filter-variant=\"veg\">🌱 Vegetariano<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Grid -->\n  <div id=\"meal-grid\" class=\"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 lg:gap-6\"><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================================================== -->\n<!-- SECTION 03: PLANNER                                 -->\n<!-- ================================================== -->\n<section data-section=\"planner\" class=\"hidden space-y-10\">\n\n  <div class=\"grid lg:grid-cols-12 gap-8 items-end\">\n    <div class=\"lg:col-span-8\">\n      <div class=\"flex items-center gap-3 mb-4\">\n        <span class=\"eyebrow text-clay-700\">03 — Settimana<\u002Fspan>\n        <span class=\"h-px w-12 bg-line\"><\u002Fspan>\n        <span class=\"eyebrow text-ink3\">Matrice decisionale<\u002Fspan>\n      <\u002Fdiv>\n      <h2 class=\"serif text-5xl sm:text-6xl tracking-tight\">7 giorni, <span class=\"serif-i text-forest-700\">due opzioni<\u002Fspan> per pasto.<\u002Fh2>\n      <p class=\"mt-3 text-ink2 text-lg max-w-2xl\">Non una dieta prescrittiva. Una matrice da cui pescare. Tocca qualsiasi opzione per aprire la ricetta completa.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"lg:col-span-4\">\n      <div class=\"bg-forest-50 border border-forest-100 rounded-2xl p-5\">\n        <div class=\"eyebrow text-forest-700 mb-2\">Regola d'oro<\u002Fdiv>\n        <p class=\"text-[14px] text-ink leading-relaxed\">Almeno 1 pasto al giorno con <strong>Omega-3<\u002Fstrong>, 1 con <strong>fibre fermentabili<\u002Fstrong>, e 1 <strong>libero consapevole<\u002Fstrong> a settimana.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Mobile cards -->\n  <div class=\"lg:hidden space-y-4\" id=\"planner-cards-mobile\"><\u002Fdiv>\n\n  <!-- Desktop table -->\n  <div class=\"hidden lg:block bg-paper border border-line rounded-3xl overflow-hidden\">\n    <div class=\"overflow-x-auto\">\n      <table class=\"w-full text-left\">\n        <thead>\n          <tr class=\"bg-ink text-canvas\">\n            <th class=\"p-5 text-xs eyebrow w-[10%]\">Giorno<\u002Fth>\n            <th class=\"p-5 text-xs eyebrow w-[22.5%]\">🌅 Colazione<\u002Fth>\n            <th class=\"p-5 text-xs eyebrow w-[22.5%]\">☀️ Pranzo<\u002Fth>\n            <th class=\"p-5 text-xs eyebrow w-[22.5%]\">🍃 Spuntino<\u002Fth>\n            <th class=\"p-5 text-xs eyebrow w-[22.5%]\">🌙 Cena<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody id=\"planner-tbody\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================================================== -->\n<!-- SECTION 04: GYM — 4-day program + 12-week progression -->\n<!-- ================================================== -->\n<section data-section=\"gym\" class=\"hidden space-y-10\">\n  <!-- Hero -->\n  <div class=\"relative bg-forest-900 text-canvas rounded-[28px] p-8 sm:p-12 lg:p-14 overflow-hidden\">\n    <div class=\"absolute -right-20 -top-20 w-96 h-96 rounded-full bg-clay-500/15 blur-3xl pointer-events-none\"><\u002Fdiv>\n    <div class=\"absolute -left-20 -bottom-20 w-80 h-80 rounded-full bg-sand-300/10 blur-3xl pointer-events-none\"><\u002Fdiv>\n\n    <div class=\"relative grid lg:grid-cols-12 gap-10 items-end\">\n      <div class=\"lg:col-span-8\">\n        <div class=\"flex items-center gap-3 mb-5\">\n          <span class=\"eyebrow text-sand-300\">04 — Allenamento<\u002Fspan>\n          <span class=\"h-px w-12 bg-canvas/30\"><\u002Fspan>\n          <span class=\"eyebrow text-canvas/60\">Upper / Lower · 4 giorni<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"serif text-5xl sm:text-6xl lg:text-7xl tracking-tight mb-5 leading-[1.02]\">\n          12 settimane di <span class=\"serif-i text-sand-300\">forza<br class=\"hidden sm:block\"> ricreativa<\u002Fspan>.\n        <\u002Fh2>\n        <p class=\"text-canvas/80 text-lg max-w-2xl leading-relaxed\">\n          Programma quadrisettimanale a 3 fasi (adattamento → accumulo → intensificazione). Forza ricreativa, dose moderata di cardio, recuperi pieni: il pattern di esercizio associato in letteratura a <strong class=\"text-canvas\">migliore funzione tiroidea<\u002Fstrong> in HT. <a data-ref=\"7\" class=\"ref-cite\">7<\u002Fa>\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lg:col-span-4\">\n        <div class=\"grid grid-cols-3 gap-3\">\n          <div class=\"bg-canvas/10 border border-canvas/15 rounded-xl p-4 backdrop-blur\">\n            <div class=\"serif text-4xl text-sand-300\">4×<\u002Fdiv>\n            <div class=\"eyebrow text-canvas/60 mt-1\">Settimana<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-canvas/10 border border-canvas/15 rounded-xl p-4 backdrop-blur\">\n            <div class=\"serif text-4xl text-sand-300\">≤55<span class=\"text-xl\">'<\u002Fspan><\u002Fdiv>\n            <div class=\"eyebrow text-canvas/60 mt-1\">Durata<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bg-canvas/10 border border-canvas/15 rounded-xl p-4 backdrop-blur\">\n            <div class=\"serif text-4xl text-sand-300\">12<span class=\"text-xl\">w<\u002Fspan><\u002Fdiv>\n            <div class=\"eyebrow text-canvas/60 mt-1\">Mesociclo<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 12-week progression -->\n  <div class=\"bg-paper border border-line rounded-3xl p-6 sm:p-8\">\n    <div class=\"flex flex-wrap items-end justify-between gap-4 mb-6\">\n      <div>\n        <span class=\"eyebrow text-clay-700\">Progressione 12 settimane<\u002Fspan>\n        <h3 class=\"serif text-2xl sm:text-3xl mt-2 tracking-tight\">3 fasi di mesociclo<\u002Fh3>\n      <\u002Fdiv>\n      <span class=\"mono text-[10px] text-ink3 uppercase tracking-widest\">Adattamento → Accumulo → Intensificazione<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Phase bar -->\n    <div class=\"grid grid-cols-12 gap-1 mb-6 h-3 overflow-hidden rounded-full bg-line\">\n      <div class=\"col-span-4 bg-forest-500\" title=\"Fase 1 · Adattamento\"><\u002Fdiv>\n      <div class=\"col-span-4 bg-sand-500\" title=\"Fase 2 · Accumulo\"><\u002Fdiv>\n      <div class=\"col-span-4 bg-clay-500\" title=\"Fase 3 · Intensificazione\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grid grid-cols-3 gap-3\" id=\"phase-tabs\">\n      <!-- populated by JS -->\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Weekly schedule -->\n  <div class=\"bg-paper border border-line rounded-2xl p-4\">\n    <div class=\"eyebrow text-ink3 mb-3 px-2\">Programmazione settimanale<\u002Fdiv>\n    <div class=\"grid grid-cols-7 gap-1.5\" id=\"week-schedule\">\n      <!-- populated by JS -->\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Day tabs + exercise rendering -->\n  <div class=\"space-y-5\">\n    <div class=\"grid grid-cols-2 md:grid-cols-4 gap-3\" id=\"day-tabs\">\n      <!-- populated by JS -->\n    <\u002Fdiv>\n    <div id=\"day-detail\">\n      <!-- populated by JS -->\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Why this works -->\n  <div class=\"grid lg:grid-cols-3 gap-5\">\n    <div class=\"bg-paper border border-line rounded-2xl p-6\">\n      <div class=\"eyebrow text-clay-700 mb-3\">Recuperi pieni<\u002Fdiv>\n      <p class=\"text-[14px] text-ink2 leading-relaxed\">Recuperi 90–150\" non sono perdita di tempo: permettono al sistema nervoso di esprimere forza piena nelle serie successive senza accumulare cortisolo.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"bg-paper border border-line rounded-2xl p-6\">\n      <div class=\"eyebrow text-clay-700 mb-3\">No HIIT in fase acuta<\u002Fdiv>\n      <p class=\"text-[14px] text-ink2 leading-relaxed\">Con anticorpi alti o astenia marcata, sostituisci l'HIIT con camminate veloci 30'. Lo studio Vuletić mostra l'effetto positivo dell'attività ricreativa. <a data-ref=\"7\" class=\"ref-cite\">7<\u002Fa><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"bg-paper border border-line rounded-2xl p-6\">\n      <div class=\"eyebrow text-clay-700 mb-3\">Progressione lenta<\u002Fdiv>\n      <p class=\"text-[14px] text-ink2 leading-relaxed\">+2.5–5 kg ogni 2 settimane è una progressione ottima. La fretta peggiora il quadro autoimmune e aumenta il rischio infortuni.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Pre/Post-workout link -->\n  <div class=\"bg-clay-50 border border-clay-100 rounded-2xl p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4\">\n    <div>\n      <div class=\"eyebrow text-clay-700 mb-2\">Nutrizione attorno all'allenamento<\u002Fdiv>\n      <p class=\"text-[15px] text-ink leading-relaxed\">4 ricette pre/post-workout dedicate: cosa mangiare 30-60' prima e entro 45' dopo per ottimizzare recupero e sintesi proteica.<\u002Fp>\n    <\u002Fdiv>\n    <button data-tab-jump=\"meals\" data-jump-filter=\"Pre/Post-Workout\" class=\"shrink-0 inline-flex items-center gap-2 px-5 py-3 bg-ink text-canvas rounded-full text-[13px] font-semibold hover:bg-clay-700 transition-colors\">\n      Vai alle ricette\n      <svg class=\"w-4 h-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================================================== -->\n<!-- SECTION 05: AI CHEF                                 -->\n<!-- ================================================== -->\n<section data-section=\"ai\" class=\"hidden space-y-10\">\n\n  <!-- Hero -->\n  <div class=\"grid lg:grid-cols-12 gap-8 items-end\">\n    <div class=\"lg:col-span-8\">\n      <div class=\"flex items-center gap-3 mb-4\">\n        <span class=\"eyebrow text-clay-700\">05 — Strumento<\u002Fspan>\n        <span class=\"h-px w-12 bg-line\"><\u002Fspan>\n        <span class=\"eyebrow text-ink3\">Generatore di ricette intelligente<\u002Fspan>\n      <\u002Fdiv>\n      <h2 class=\"serif text-5xl sm:text-6xl tracking-tight\">\n        <span class=\"serif-i text-clay-700\">AI Chef<\u002Fspan><br>\n        per Hashimoto.\n      <\u002Fh2>\n      <p class=\"mt-3 text-ink2 text-lg max-w-2xl\">\n        Dimmi <strong class=\"text-ink\">cosa hai in frigo<\u002Fstrong> o <strong class=\"text-ink\">cosa vorresti mangiare<\u002Fstrong>: ti propongo una ricetta calibrata sul protocollo (alta proteina, anti-infiammatoria, micronutrienti tiroidei) con razionale scientifico.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"lg:col-span-4\">\n      <div class=\"bg-forest-900 text-canvas rounded-2xl p-5 relative overflow-hidden\">\n        <div class=\"absolute -right-10 -top-10 w-40 h-40 rounded-full bg-clay-500/20 blur-2xl pointer-events-none\"><\u002Fdiv>\n        <div class=\"relative\">\n          <div class=\"flex items-center gap-2 mb-3\">\n            <span class=\"relative flex h-2 w-2\">\n              <span class=\"animate-ping absolute inline-flex h-full w-full rounded-full bg-sand-300 opacity-75\"><\u002Fspan>\n              <span class=\"relative inline-flex rounded-full h-2 w-2 bg-sand-300\"><\u002Fspan>\n            <\u002Fspan>\n            <span class=\"eyebrow text-sand-300\">Powered by Claude<\u002Fspan>\n          <\u002Fdiv>\n          <p class=\"text-[13.5px] text-canvas/80 leading-relaxed\">Le ricette generate seguono i pilastri del protocollo. Nessun dato è salvato fuori dal tuo browser.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Mode toggle -->\n  <div class=\"flex flex-col sm:flex-row gap-3\">\n    <button class=\"ai-mode flex items-center gap-4\" data-ai-mode=\"fridge\" data-active=\"true\">\n      <div class=\"ai-mode-icon\">\n        <svg class=\"w-6 h-6 text-clay-700\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n          <rect x=\"5\" y=\"3\" width=\"14\" height=\"18\" rx=\"2\"><\u002Frect>\n          <path d=\"M5 10h14M9 7v0M9 14v0\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"flex-1\">\n        <div class=\"serif text-2xl leading-tight\">Cosa ho in frigo<\u002Fdiv>\n        <div class=\"ai-mode-desc text-[13px] text-ink2 mt-1\">Lista degli ingredienti disponibili<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fbutton>\n    <button class=\"ai-mode flex items-center gap-4\" data-ai-mode=\"craving\">\n      <div class=\"ai-mode-icon\">\n        <svg class=\"w-6 h-6 text-clay-700\" viewBox=\"0 0
